<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>Foderstatus</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --accent: #38bdf8;
  --ok: #22c55e;
  --not-ok: #ef4444;
  --text: #e2e8f0;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(180deg, #0f172a, #020617);
  color: var(--text);
  padding: 20px;
}

h1 {
  text-align: center;
  font-weight: 600;
  margin-bottom: 10px;
}

.topbar {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

button {
  background: var(--accent);
  border: none;
  padding: 10px 16px;
  border-radius: 10px;
  color: black;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.card h2 {
  margin-top: 0;
  margin-bottom: 10px;
}

table {
  width: 100%;
  border-collapse: collapse;
}

td, th {
  padding: 12px;
  text-align: left;
}

th {
  opacity: 0.7;
  font-weight: 400;
}

tr {
  border-bottom: 1px solid rgba(255,255,255,0.05);
}

.status {
  font-weight: 600;
  border-radius: 8px;
  text-align: center;
  padding: 6px;
}

.ok {
  background: rgba(34,197,94,0.2);
  color: var(--ok);
}

.not-ok {
  background: rgba(239,68,68,0.2);
  color: var(--not-ok);
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: #020617;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
}

select:hover {
  border-color: var(--accent);
}

.loading {
  text-align: center;
  opacity: 0.7;
  margin-top: 40px;
}
</style>
</head>

<body>

<script>
let authorized = false;
const password = "JulleMus";
const userInput = prompt("Indtast adgangskode:");

if (userInput !== password) {
  document.body.innerHTML = "<h1>Forkert kode</h1>";
} else {
  authorized = true;
}
</script>

<h1>🐎 Foderstatus</h1>

<div class="topbar">
  <button onclick="refreshPage()">🔄 Opdater</button>
</div>

<div id="output">
  <div class="loading">Indlæser data...</div>
</div>

<script>
if (!authorized) throw new Error("Ikke autoriseret");

const apiURL = "https://script.google.com/macros/s/AKfycbzrQzGRI-N-TbykmHMKXVYWmhKK1Uh0_BdTXFd6Yd0m_pLCTyMAOL7oeSWO9DIpHFKQ7A/exec";
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSdGPn-TFcWLdSdzcxEecrdwIlcJqYYQQ_BX5txpXojqSQn7zPers_3tFtSS2wWdBPQdADeBua4MFj7/pub?output=csv";

function refreshPage() {
  location.reload();
}

function updateStatus(navn, dag, status, cellElement) {
  fetch(apiURL, {
    method: "POST",
    body: JSON.stringify({ navn, dag, status })
  })
  .then(res => res.text())
  .then(result => {
    if (result === "OK") {
      cellElement.textContent = status;
      cellElement.className = "status " + (status === "OK" ? "ok" : "not-ok");
    } else {
      alert("Fejl ved opdatering");
    }
  });
}

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    const lines = csv.split("\n").map(l => l.trim()).filter(l => l);
    const sep = lines[0].includes(";") ? ";" : ",";
    const rows = lines.map(r => r.split(sep));

    const header = rows[0];
    const kenny = rows[1];
    const carlos = rows[2];

    const days = header.slice(1);
    const persons = {
      Kenny: kenny.slice(1),
      Carlos: carlos.slice(1)
    };

    const container = document.getElementById("output");
    container.innerHTML = "";

    Object.keys(persons).forEach(person => {
      const card = document.createElement("div");
      card.className = "card";

      let html = `<h2>${person}</h2>`;
      html += `<table><tr><th>Dag</th><th>Status</th><th>Ændr</th></tr>`;

      days.forEach((day, i) => {
        const status = persons[person][i].trim();
        const cls = status === "OK" ? "ok" : "not-ok";

        html += `
          <tr>
            <td>${day}</td>
            <td class="status ${cls}" id="${person}-${day}">${status}</td>
            <td>
              <select onchange="updateStatus('${person}','${day}', this.value, document.getElementById('${person}-${day}'))">
                <option value="OK" ${status === "OK" ? "selected" : ""}>OK</option>
                <option value="IKKE OK" ${status === "IKKE OK" ? "selected" : ""}>IKKE OK</option>
              </select>
            </td>
          </tr>
        `;
      });

      html += "</table>";
      card.innerHTML = html;
      container.appendChild(card);
    });
  })
  .catch(err => {
    document.getElementById("output").innerHTML = "Fejl: " + err;
  });
</script>

</body>
</html>
